<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

</head>

<body>
    <main class="container">
        <form>
            <h1>Cadastro</h1>
            <div class="input-box">
                <label for="nome">Nome:</label>
                <input type="text" placeholder="Digite seu nome" id="nome" name="nome">
            </div>
            <div class="input-box">
                <label for="email">Email:</label>
                <input type="text" placeholder="Digite seu email" id="email" name="email">
            </div>
            <div class="input-box">
                <label for="senha">Senha:</label>
                <input type="password" placeholder="Digite sua senha" id="senha" name="senha">
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="input-box">
                <label for="confirme_sua_senha">Confirme sua senha:</label>
                <input type="password" placeholder="Confirme sua senha" id="confirme_sua_senha" name="confirme_sua_senha">
            </div>
            <button type="submit" id= "cadastrar"class="cadastrar">Cadastrar</button>
        </form>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
